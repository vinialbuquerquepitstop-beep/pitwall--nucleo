<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="light">
<title>Pit Wall · Pitstop Imports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css">
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="telaLogin" class="login">
  <div class="login-box">
    <div class="marca">Pit Wall</div>
    <div class="marca-sub">Pitstop Imports · Núcleo</div>
    <div class="campo">
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="username" inputmode="email">
    </div>
    <div class="campo">
      <label for="senha">Senha</label>
      <input id="senha" type="password" autocomplete="current-password">
    </div>
    <button id="btnEntrar" class="btn-entrar">Entrar</button>
    <div id="loginErro" class="login-erro" role="alert"></div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="telaApp" class="app oculto">

  <!-- Barra lateral no desktop, barra inferior no celular.
       Os botoes de aba sao os mesmos: o que muda e o layout, nao o DOM.
       No celular a barra mostra 5 (Hoje, Fila, Todos, Conteúdo, Mais); as 4
       raras (.aba-rara) abrem numa segunda linha pelo Mais (decisao 7, v29). -->
  <aside class="side">
    <div class="side-marca">
      <div class="marca">Pit Wall</div>
      <div class="marca-sub">Pitstop Imports</div>
    </div>

    <div class="abas" id="abas" role="tablist">
      <p class="nav-rot">Operação</p>
      <button class="aba" id="abaHoje" role="tab" aria-selected="false">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 3v2.2M12 18.8V21M3 12h2.2M18.8 12H21M5.6 5.6l1.6 1.6M16.8 16.8l1.6 1.6M18.4 5.6l-1.6 1.6M7.2 16.8l-1.6 1.6" stroke-linecap="round"/></svg>
        <span class="aba-txt">Hoje</span>
      </button>
      <button class="aba" id="abaFila" role="tab" aria-selected="true">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h10M4 12h16M4 17h7" stroke-linecap="round"/></svg>
        <span class="aba-txt">Fila do dia</span>
        <span class="nav-badge" id="badgeFila"></span>
      </button>
      <button class="aba" id="abaTodos" role="tab" aria-selected="false">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="7" height="7" rx="1.5"/><rect x="13" y="4" width="7" height="7" rx="1.5"/><rect x="4" y="13" width="7" height="7" rx="1.5"/><rect x="13" y="13" width="7" height="7" rx="1.5"/></svg>
        <span class="aba-txt">Todos</span>
      </button>
      <button class="aba aba-rara" id="abaIndicacoes" role="tab" aria-selected="false">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19a5.5 5.5 0 0 1 11 0" stroke-linecap="round"/><path d="M17 9.5v5M14.5 12h5" stroke-linecap="round"/></svg>
        <span class="aba-txt">Indicações</span>
      </button>

      <button class="aba aba-rara" id="abaCaptacao" role="tab" aria-selected="false">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3.2"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke-linecap="round"/></svg>
        <span class="aba-txt">Captação</span>
        <span class="nav-badge" id="badgeCaptacao"></span>
      </button>

      <button class="aba" id="abaConteudo" role="tab" aria-selected="false">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M8 3v4M16 3v4M4 10h16" stroke-linecap="round"/></svg>
        <span class="aba-txt">Conteúdo</span>
      </button>
      <button class="aba aba-rara" id="abaRotina" role="tab" aria-selected="false">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 12a8 8 0 1 1-2.34-5.66M20 4v4h-4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="aba-txt">Rotina</span>
      </button>

      <p class="nav-rot nav-rot-2">Análise</p>
      <button class="aba aba-rara" id="abaDash" role="tab" aria-selected="false">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 19V11M12 19V5M19 19v-6" stroke-linecap="round"/></svg>
        <span class="aba-txt">Dashboard</span>
      </button>

      <p class="nav-rot nav-rot-2">Ferramentas</p>
      <a class="aba aba-rara" id="abaCalc" href="/calc/" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M8 7h8M8 11h.01M12 11h.01M16 11h.01M8 15h.01M12 15h.01M16 15h.01M8 19h4" stroke-linecap="round"/></svg>
        <span class="aba-txt">Calculadora</span>
      </a>

      <button class="aba aba-mais" id="abaMais" aria-expanded="false" aria-label="Mais abas">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="5" cy="12" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="19" cy="12" r="1.4"/></svg>
        <span class="aba-txt">Mais</span>
      </button>
    </div>

    <div class="side-pe">
      <div class="avatar" aria-hidden="true">V</div>
      <div class="side-pe-txt">
        <span class="side-pe-nome">Vini</span>
        <span class="side-user">Dono</span>
      </div>
      <button id="btnSair" class="link-acao" aria-label="Sair">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 17l5-5-5-5M20 12H9M11 4H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </aside>

  <main class="conteudo">

    <div class="topo">
      <div class="topo-esq">
        <h1 class="topo-tit" id="topoTit">Fila do dia</h1>
        <span class="topo-sub" id="topoSub"></span>
      </div>
      <div class="topo-acoes">
        <button id="btnAtualizar" class="link-acao">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11a8 8 0 1 0-2.3 5.7M20 5v6h-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Atualizar
        </button>
        <button id="btnNovoLead" class="link-acao">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
          Novo lead
        </button>
      </div>
    </div>

    <div class="pitboard" id="pitboard">
      <div class="pb-celula"><div class="pb-rot">na fila</div><div class="pb-num" id="pbFila">0</div><div class="pb-pe">vencendo hoje</div></div>
      <div class="pb-celula"><div class="pb-rot">em atraso</div><div class="pb-num" id="pbAtraso">0</div><div class="pb-pe">passaram da data</div></div>
      <div class="pb-celula"><div class="pb-rot">ativos</div><div class="pb-num" id="pbAtivos">0</div><div class="pb-pe">leads pendentes</div></div>
      <div class="pb-celula"><div class="pb-rot">na base</div><div class="pb-num" id="pbTotal">0</div><div class="pb-pe">no total</div></div>
    </div>

    <!-- ---------- Novo lead ---------- -->
    <div id="painelCadastro" class="painel-cadastro oculto">
      <h2>Novo lead</h2>
      <div class="campo"><label for="cadNome">Nome *</label><input id="cadNome" type="text" autocomplete="off"></div>
      <div class="campo"><label for="cadWhats">WhatsApp *</label><input id="cadWhats" type="tel" inputmode="tel" placeholder="DDD + número" autocomplete="off"></div>
      <div class="campo"><label for="cadProduto">Produto *</label><input id="cadProduto" type="text" placeholder="iPhone 16 Pro, MacBook M3..." autocomplete="off"></div>
      <div class="campo"><label for="cadCondicao">Condição *</label><select id="cadCondicao"></select></div>
      <div class="campo"><label for="cadPerfil">Perfil *</label><select id="cadPerfil"></select></div>
      <div class="campo"><label for="cadOrigem">Origem *</label><select id="cadOrigem"></select></div>
      <div class="campo oculto" id="campoIndicado"><label for="cadIndicado">Indicado por *</label><input id="cadIndicado" type="text" autocomplete="off"></div>
      <div class="campo">
        <label for="cadConsent">Consentimento</label>
        <select id="cadConsent"><option value="sim" selected="selected">Sim</option><option value="nao">Não</option></select>
      </div>
      <div class="campo"><label for="cadObs">Observação</label><input id="cadObs" type="text" autocomplete="off"></div>
      <div class="campo">
        <label for="cadUpgrade">Upgrade (dá aparelho de entrada?)</label>
        <select id="cadUpgrade"><option value="">Não informado</option><option value="sim">Sim</option><option value="nao">Não</option></select>
      </div>
      <div class="campo"><label for="cadAparelho">Aparelho de entrada</label><input id="cadAparelho" type="text" autocomplete="off"></div>
      <div id="cadDup" class="cad-dup">
        <span id="cadDupMsg"></span>
        <button id="btnAbrirExistente" class="btn-cad secundario">Abrir lead existente</button>
      </div>
      <div class="cad-acoes">
        <button id="btnCadastrar" class="btn-cad">Cadastrar</button>
        <button id="btnCancelarCadastro" class="btn-cad secundario">Cancelar</button>
      </div>
      <div id="cadErro" class="cad-erro" role="alert"></div>
    </div>

    <!-- ---------- Editar lead ---------- -->
    <div id="painelEdicao" class="painel-cadastro oculto">
      <h2 id="edTitulo">Editar lead</h2>
      <div class="campo"><label for="edNome">Nome *</label><input id="edNome" type="text" autocomplete="off"></div>
      <div class="campo"><label for="edWhats">WhatsApp</label><input id="edWhats" type="tel" inputmode="tel" placeholder="DDD + número" autocomplete="off"></div>
      <div class="campo"><label for="edProduto">Produto *</label><input id="edProduto" type="text" autocomplete="off"></div>
      <div class="campo"><label for="edCondicao">Condição *</label><select id="edCondicao"></select></div>
      <div class="campo"><label for="edPerfil">Perfil *</label><select id="edPerfil"></select></div>
      <div class="campo"><label for="edOrigem">Origem *</label><select id="edOrigem"></select></div>
      <div class="campo oculto" id="campoEdIndicado"><label for="edIndicado">Indicado por *</label><input id="edIndicado" type="text" autocomplete="off"></div>
      <div class="campo"><label for="edNasc">Data de nascimento</label><input id="edNasc" type="date"></div>
      <div class="campo"><label for="edProx">Próximo contato</label><input id="edProx" type="date"></div>
      <div class="campo"><label for="edValor">Valor da oferta (R$)</label><input id="edValor" type="number" inputmode="decimal" step="0.01" min="0" autocomplete="off"></div>
      <div class="campo"><label for="edObs">Observação</label><input id="edObs" type="text" autocomplete="off"></div>
      <div class="campo">
        <label for="edUpgrade">Upgrade (dá aparelho de entrada?)</label>
        <select id="edUpgrade"><option value="">Não informado</option><option value="sim">Sim</option><option value="nao">Não</option></select>
      </div>
      <div class="campo"><label for="edAparelho">Aparelho de entrada</label><input id="edAparelho" type="text" autocomplete="off"></div>
      <div class="cad-acoes">
        <button id="btnSalvarEdicao" class="btn-cad">Salvar</button>
        <button id="btnCancelarEdicao" class="btn-cad secundario">Cancelar</button>
      </div>
      <div class="cad-acoes">
        <button id="btnArquivar" class="btn-cad perigo">Arquivar lead</button>
      </div>
      <div id="edErro" class="cad-erro" role="alert"></div>
    </div>

    <div class="busca" id="blocoBusca">
      <input id="inputBusca" type="search" placeholder="Buscar por nome, telefone ou produto" autocomplete="off">
    </div>

    <div class="lista" id="lista" aria-live="polite"></div>
    <div class="rodape" id="rodape"></div>
  </main>
</div>

<div id="toast" class="toast" role="status"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>
