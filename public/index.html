<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>Pit Wall · Pitstop Imports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#10151c;
  --panel:#1a212b;
  --panel-2:#151b24;
  --line:#28313d;
  --text:#e9edf2;
  --dim:#8b97a5;
  --accent:#0025cc;      /* azul da marca Pitstop */
  --quente:#ff5d45;
  --morno:#f2a71b;
  --frio:#6db8e8;
  --ok:#43c98a;
  --erro:#ff6b5e;
  --radius:12px;
  --display:'Chakra Petch',system-ui,sans-serif;
  --body:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:ui-monospace,'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--body);
  font-size:15px;
  line-height:1.45;
  min-height:100dvh;
}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}
a{color:inherit}

/* ---------- login ---------- */
.login{
  min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;
}
.login-box{width:100%;max-width:360px}
.marca{
  font-family:var(--display);font-weight:700;font-size:28px;letter-spacing:.06em;
  text-transform:uppercase;
}
.marca .traco{color:var(--accent)}
.marca-sub{
  font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.18em;
  text-transform:uppercase;margin-top:2px;margin-bottom:28px;
}
.campo{margin-bottom:12px}
.campo label{
  display:block;font-family:var(--mono);font-size:11px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--dim);margin-bottom:6px;
}
.campo input{
  width:100%;background:var(--panel);border:1px solid var(--line);color:var(--text);
  border-radius:10px;padding:12px 14px;font-size:16px;outline:none;
}
.campo input:focus{border-color:var(--accent)}
.btn-entrar{
  width:100%;margin-top:8px;background:var(--accent);color:#fff;border:none;
  border-radius:10px;padding:13px;font-family:var(--display);font-weight:700;
  font-size:15px;letter-spacing:.08em;text-transform:uppercase;
}
.btn-entrar:disabled{opacity:.55}
.login-erro{
  margin-top:12px;color:var(--erro);font-size:13px;min-height:18px;
}

/* ---------- app ---------- */
.app{max-width:640px;margin:0 auto;padding:0 14px calc(28px + env(safe-area-inset-bottom))}
.topo{
  display:flex;align-items:baseline;justify-content:space-between;
  padding:16px 2px 10px;
}
.topo .marca{font-size:19px}
.topo-acoes{display:flex;gap:14px;align-items:center}
.link-acao{
  background:none;border:none;color:var(--dim);font-family:var(--mono);
  font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:4px 0;
}
.link-acao:hover,.link-acao:focus-visible{color:var(--text)}

/* pit board: resumo do dia */
.pitboard{
  display:flex;gap:0;border:1px solid var(--line);border-radius:var(--radius);
  overflow:hidden;background:var(--panel-2);margin-bottom:14px;
}
.pb-celula{
  flex:1;padding:10px 8px 9px;text-align:center;border-right:1px solid var(--line);
}
.pb-celula:last-child{border-right:none}
.pb-num{font-family:var(--display);font-weight:700;font-size:22px;line-height:1.1}
.pb-num.alerta{color:var(--quente)}
.pb-rot{
  font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--dim);margin-top:1px;
}

/* abas */
.abas{display:flex;gap:8px;margin-bottom:12px}
.aba{
  flex:1;background:var(--panel-2);border:1px solid var(--line);color:var(--dim);
  border-radius:10px;padding:9px;font-family:var(--display);font-weight:600;
  font-size:13px;letter-spacing:.08em;text-transform:uppercase;
}
.aba[aria-selected="true"]{
  background:var(--panel);color:var(--text);border-color:var(--accent);
}
.busca{margin-bottom:12px;display:none}
.busca.visivel{display:block}
.busca input{
  width:100%;background:var(--panel);border:1px solid var(--line);color:var(--text);
  border-radius:10px;padding:11px 14px;font-size:16px;outline:none;
}
.busca input:focus{border-color:var(--accent)}

/* cards */
.lista{display:flex;flex-direction:column;gap:10px}
.card{
  position:relative;background:var(--panel);border:1px solid var(--line);
  border-radius:var(--radius);padding:13px 14px 13px 20px;overflow:hidden;
}
/* assinatura: faixa de temperatura de pneu na borda esquerda */
.card::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:6px;
  background:var(--line);
}
.card.t-quente::before{background:var(--quente)}
.card.t-morno::before{background:var(--morno)}
.card.t-frio::before{background:var(--frio)}
.card-topo{display:flex;justify-content:space-between;gap:10px;align-items:baseline}
.card-nome{font-family:var(--display);font-weight:600;font-size:17px}
.card-code{font-family:var(--mono);font-size:10.5px;color:var(--dim);letter-spacing:.06em}
.card-prod{color:var(--text);font-size:14px;margin-top:3px}
.card-prod .cond{color:var(--dim)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;align-items:center}
.chip{
  font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;
  border:1px solid var(--line);border-radius:999px;padding:3px 9px;color:var(--dim);
}
.chip.nivel-morno{color:var(--morno);border-color:var(--morno)}
.chip.nivel-frio{color:var(--frio);border-color:var(--frio)}
.chip.atraso{color:var(--quente);border-color:var(--quente)}
.silencio{
  font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:8px;
}
.silencio.alerta{color:var(--quente)}
.card-acoes{display:flex;gap:8px;margin-top:11px}
.btn-wa{
  flex:1;display:flex;align-items:center;justify-content:center;gap:7px;
  background:#173527;border:1px solid #2c6647;color:#5ee39d;text-decoration:none;
  border-radius:10px;padding:10px;font-family:var(--display);font-weight:600;
  font-size:13px;letter-spacing:.05em;
}
.btn-wa:focus-visible{outline:2px solid var(--ok)}
.sem-tel{
  flex:1;text-align:center;border:1px dashed var(--line);border-radius:10px;
  padding:10px;font-family:var(--mono);font-size:11px;color:var(--dim);
  letter-spacing:.08em;text-transform:uppercase;
}
.obs{font-size:13px;color:var(--dim);margin-top:8px}

/* estados */
.estado{
  border:1px dashed var(--line);border-radius:var(--radius);padding:26px 18px;
  text-align:center;color:var(--dim);font-size:14px;
}
.estado strong{color:var(--text);font-family:var(--display)}
.estado.erro{border-color:var(--erro);color:var(--erro)}
.rodape{
  margin-top:18px;text-align:center;font-family:var(--mono);font-size:10px;
  color:var(--dim);letter-spacing:.1em;
}
.oculto{display:none !important}
@media (prefers-reduced-motion:no-preference){
  .card{animation:entra .18s ease-out both}
  @keyframes entra{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="telaLogin" class="login">
  <div class="login-box">
    <div class="marca">PIT<span class="traco">/</span>WALL</div>
    <div class="marca-sub">Pitstop Imports · Nucleo</div>
    <div class="campo">
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="username" inputmode="email">
    </div>
    <div class="campo">
      <label for="senha">Senha</label>
      <input id="senha" type="password" autocomplete="current-password">
    </div>
    <button id="btnEntrar" class="btn-entrar">Entrar</button>
    <div id="loginErro" class="login-erro" role="alert"></div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="telaApp" class="app oculto">
  <div class="topo">
    <div class="marca">PIT<span class="traco">/</span>WALL</div>
    <div class="topo-acoes">
      <button id="btnAtualizar" class="link-acao">Atualizar</button>
      <button id="btnSair" class="link-acao">Sair</button>
    </div>
  </div>

  <div class="pitboard" id="pitboard">
    <div class="pb-celula"><div class="pb-num" id="pbFila">0</div><div class="pb-rot">na fila</div></div>
    <div class="pb-celula"><div class="pb-num" id="pbAtraso">0</div><div class="pb-rot">em atraso</div></div>
    <div class="pb-celula"><div class="pb-num" id="pbAtivos">0</div><div class="pb-rot">ativos</div></div>
    <div class="pb-celula"><div class="pb-num" id="pbTotal">0</div><div class="pb-rot">na base</div></div>
  </div>

  <div class="abas" role="tablist">
    <button class="aba" id="abaFila" role="tab" aria-selected="true">Fila do dia</button>
    <button class="aba" id="abaTodos" role="tab" aria-selected="false">Todos</button>
  </div>

  <div class="busca" id="blocoBusca">
    <input id="inputBusca" type="search" placeholder="Buscar por nome, telefone ou produto" autocomplete="off">
  </div>

  <div class="lista" id="lista" aria-live="polite"></div>
  <div class="rodape" id="rodape"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================
   Pit Wall 2.0 (Nucleo) - index de leitura, Fase 1
   Somente leitura: nenhuma escrita no banco acontece aqui.
   nivel e dias_silencio vem PRONTOS da view v_lead (Rota A).
   ============================================================ */
window.PitWall = (function () {
  'use strict';

  var CFG = {
    url: 'https://unjzpyexgtbcmjfgcqrx.supabase.co',
    anon: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVuanpweWV4Z3RiY21qZmdjcXJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMTgyOTQsImV4cCI6MjA5ODY5NDI5NH0.SDH7Wa7z4jS6M4unhZcKRJJbrrTvi9jXkbs9JqdM-ZU'
  };

  /* Fallback de rotulos (espelho do dicionario_rotulos em 05/07/2026).
     Em runtime o dicionario do banco sobrepoe este mapa. */
  var ROTULOS_FALLBACK = {
    condicao: { lacrado: 'Lacrado', vitrine: 'Vitrine', seminovo: 'Seminovo' },
    status: {
      pendente: '\uD83D\uDFE1 Pendente', feito: '\u2705 Feito',
      convertido: '\uD83D\uDFE2 Convertido', lista_fria: '\u2744\uFE0F Lista fria',
      cancelado: '\uD83D\uDEAB Cancelado'
    },
    perfil: {
      compra_imediata: 'Lead \u2014 Compra imediata', avaliando: 'Lead \u2014 Avaliando',
      em_espera: 'Lead \u2014 Em espera', repescagem: 'Lead \u2014 Repescagem',
      comprou: 'Lead \u2014 Comprou', consulta: 'Lead \u2014 Consulta'
    },
    origem: {
      indicacao: 'Indicacao', instagram: 'Instagram', whatsapp_direto: 'WhatsApp direto',
      loja_fisica: 'Loja fisica', prospeccao_ativa: 'Prospeccao ativa',
      parceria_influencer: 'Parceria influencer', parceria_pag_local: 'Parceria PAG local',
      whatsapp_status: 'WhatsApp Status'
    },
    nivel: { quente: '\uD83D\uDD25 Quente', morno: '\uD83C\uDF21\uFE0F Morno', frio: '\u2744\uFE0F Frio' }
  };

  var rotulos = JSON.parse(JSON.stringify(ROTULOS_FALLBACK));
  var sb = null;
  var leads = [];
  var abaAtiva = 'fila';
  var geradoEm = null;

  /* ---------- utilitarios puros (testaveis) ---------- */

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function setRotulos(linhas) {
    (linhas || []).forEach(function (r) {
      if (!r || !r.dominio || !r.codigo) return;
      if (!rotulos[r.dominio]) rotulos[r.dominio] = {};
      rotulos[r.dominio][r.codigo] = r.rotulo;
    });
  }

  function rotulo(dominio, codigo) {
    if (!codigo) return '';
    return (rotulos[dominio] && rotulos[dominio][codigo]) || codigo;
  }

  /* Data local do aparelho no formato YYYY-MM-DD (fuso do operador). */
  function hojeLocalISO(d) {
    var x = d || new Date();
    var m = String(x.getMonth() + 1), dia = String(x.getDate());
    return x.getFullYear() + '-' + (m.length < 2 ? '0' + m : m) + '-' + (dia.length < 2 ? '0' + dia : dia);
  }

  /* timestamptz -> data local YYYY-MM-DD, ou null */
  function dataLocalDe(ts) {
    if (!ts) return null;
    var d = new Date(ts);
    if (isNaN(d.getTime())) return null;
    return hojeLocalISO(d);
  }

  function diasAtraso(proxISO, hojeISO) {
    if (!proxISO) return 0;
    var a = new Date(proxISO + 'T12:00:00');
    var b = new Date(hojeISO + 'T12:00:00');
    return Math.round((b - a) / 86400000);
  }

  /* Regra da fila (leitura): pendente, vencido ou vence hoje, e nao tocado hoje. */
  function entraNaFila(lead, hojeISO) {
    if (!lead || lead.status !== 'pendente') return false;
    if (!lead.proximo_contato || lead.proximo_contato > hojeISO) return false;
    if (dataLocalDe(lead.ultimo_toque_em) === hojeISO) return false;
    return true;
  }

  function montarFila(todos, hojeISO) {
    return (todos || []).filter(function (l) { return entraNaFila(l, hojeISO); })
      .sort(function (a, b) {
        if (a.proximo_contato !== b.proximo_contato) {
          return a.proximo_contato < b.proximo_contato ? -1 : 1;
        }
        return String(a.nome || '').localeCompare(String(b.nome || ''));
      });
  }

  function filtrarBusca(todos, termo) {
    var t = String(termo || '').trim().toLowerCase();
    if (!t) return (todos || []).slice();
    return (todos || []).filter(function (l) {
      return String(l.nome || '').toLowerCase().indexOf(t) >= 0 ||
             String(l.whatsapp_digitos || '').indexOf(t.replace(/\D/g, '') || '\u0000') >= 0 ||
             String(l.produto || '').toLowerCase().indexOf(t) >= 0;
    });
  }

  /* WhatsApp da FILA: template + trava de consentimento. So abre, nao registra. */
  function waHrefFila(lead) {
    if (!lead || lead.consentimento !== true) return null;
    var dig = String(lead.whatsapp_digitos || '').replace(/\D/g, '');
    if (!dig) return null;
    var msg = 'Oi ' + (lead.nome || '') + '! Vi seu interesse no ' + (lead.produto || 'aparelho') +
              ', posso te passar as condicoes?';
    return 'https://wa.me/' + dig + '?text=' + encodeURIComponent(msg);
  }

  /* WhatsApp da aba TODOS: link limpo, sem template, sem trava. Checagem nao e contato. */
  function waHrefLimpo(lead) {
    var dig = String((lead && lead.whatsapp_digitos) || '').replace(/\D/g, '');
    return dig ? 'https://wa.me/' + dig : null;
  }

  /* ---------- render ---------- */

  function cardHTML(lead, modo, hojeISO) {
    var nivel = lead.nivel || 'quente';
    var atraso = modo === 'fila' ? diasAtraso(lead.proximo_contato, hojeISO) : 0;
    var chips = [];

    if (modo === 'fila' && atraso > 0) {
      chips.push('<span class="chip atraso">' + atraso + 'd de atraso</span>');
    }
    if (lead.perfil) {
      chips.push('<span class="chip">' + esc(rotulo('perfil', lead.perfil)) + '</span>');
    }
    /* Quente e o default e vira ruido: so morno e frio ganham badge. */
    if (nivel === 'morno' || nivel === 'frio') {
      chips.push('<span class="chip nivel-' + nivel + '">' + esc(rotulo('nivel', nivel)) + '</span>');
    }
    if (modo === 'todos' && lead.status) {
      chips.push('<span class="chip">' + esc(rotulo('status', lead.status)) + '</span>');
    }

    var termometro = '';
    if (typeof lead.dias_silencio === 'number') {
      var alerta = lead.dias_silencio >= 3 ? ' alerta' : '';
      termometro = '<div class="silencio' + alerta + '">' + lead.dias_silencio + 'd sem resposta</div>';
    }

    var acao;
    var href = modo === 'fila' ? waHrefFila(lead) : waHrefLimpo(lead);
    if (href) {
      var rotuloBtn = modo === 'fila' ? 'Chamar no WhatsApp' : 'Abrir conversa';
      acao = '<a class="btn-wa" target="_blank" rel="noopener" href="' + esc(href) + '">' + rotuloBtn + '</a>';
    } else if (!String(lead.whatsapp_digitos || '').trim()) {
      acao = '<div class="sem-tel">Sem telefone na base</div>';
    } else {
      acao = '<div class="sem-tel">Sem consentimento</div>';
    }

    var obs = lead.observacoes
      ? '<div class="obs">' + esc(lead.observacoes) + '</div>'
      : '';

    return '<article class="card t-' + esc(nivel) + '" data-lead="' + esc(lead.lead_code || '') + '">' +
      '<div class="card-topo">' +
        '<div class="card-nome">' + esc(lead.nome || '') + '</div>' +
        '<div class="card-code">' + esc(lead.lead_code || '') + '</div>' +
      '</div>' +
      '<div class="card-prod">' + esc(lead.produto || '') +
        (lead.condicao ? ' <span class="cond">\u00B7 ' + esc(rotulo('condicao', lead.condicao)) + '</span>' : '') +
      '</div>' +
      '<div class="chips">' + chips.join('') + '</div>' +
      termometro + obs +
      '<div class="card-acoes">' + acao + '</div>' +
    '</article>';
  }

  function renderLista(el, itens, modo, hojeISO, vazioHTML) {
    if (!itens.length) { el.innerHTML = vazioHTML; return; }
    el.innerHTML = itens.map(function (l) { return cardHTML(l, modo, hojeISO); }).join('');
  }

  function renderPitboard(hojeISO) {
    var fila = montarFila(leads, hojeISO);
    var atrasados = fila.filter(function (l) { return diasAtraso(l.proximo_contato, hojeISO) > 0; });
    var ativos = leads.filter(function (l) { return l.status === 'pendente'; });
    doc('pbFila').textContent = String(fila.length);
    var pbA = doc('pbAtraso');
    pbA.textContent = String(atrasados.length);
    pbA.className = 'pb-num' + (atrasados.length ? ' alerta' : '');
    doc('pbAtivos').textContent = String(ativos.length);
    doc('pbTotal').textContent = String(leads.length);
  }

  function renderAba() {
    var hoje = hojeLocalISO();
    var el = doc('lista');
    doc('abaFila').setAttribute('aria-selected', abaAtiva === 'fila' ? 'true' : 'false');
    doc('abaTodos').setAttribute('aria-selected', abaAtiva === 'todos' ? 'true' : 'false');
    doc('blocoBusca').className = 'busca' + (abaAtiva === 'todos' ? ' visivel' : '');

    if (abaAtiva === 'fila') {
      renderLista(el, montarFila(leads, hoje), 'fila', hoje,
        '<div class="estado"><strong>Fila limpa.</strong><br>Nenhum lead vence hoje. O proximo entra sozinho na data marcada.</div>');
    } else {
      var termo = doc('inputBusca').value;
      renderLista(el, filtrarBusca(leads, termo), 'todos', hoje,
        '<div class="estado">Nenhum lead corresponde a busca. Ajuste o termo ou limpe o campo.</div>');
    }
    doc('rodape').textContent = geradoEm
      ? 'v_lead \u00B7 leitura ' + geradoEm + ' \u00B7 escrita chega na Fase 2'
      : '';
  }

  function doc(id) { return document.getElementById(id); }

  /* ---------- dados ---------- */

  async function carregar() {
    doc('lista').innerHTML = '<div class="estado">Lendo a base\u2026</div>';
    var rl = await sb.from('dicionario_rotulos').select('dominio,codigo,rotulo');
    if (!rl.error && rl.data) setRotulos(rl.data);

    var r = await sb.from('v_lead').select('*')
      .order('proximo_contato', { ascending: true, nullsFirst: false });
    if (r.error) {
      doc('lista').innerHTML =
        '<div class="estado erro">Falha ao ler a base: ' + esc(r.error.message) +
        '. Toque em Atualizar para tentar de novo.</div>';
      return;
    }
    leads = r.data || [];
    var d = new Date();
    geradoEm = ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
    renderPitboard(hojeLocalISO());
    renderAba();
  }

  /* ---------- auth e boot ---------- */

  function mostrarApp(logado) {
    doc('telaLogin').className = 'login' + (logado ? ' oculto' : '');
    doc('telaApp').className = 'app' + (logado ? '' : ' oculto');
  }

  async function entrar() {
    var btn = doc('btnEntrar'), erro = doc('loginErro');
    erro.textContent = '';
    btn.disabled = true; btn.textContent = 'Entrando\u2026';
    var r = await sb.auth.signInWithPassword({
      email: doc('email').value.trim(),
      password: doc('senha').value
    });
    btn.disabled = false; btn.textContent = 'Entrar';
    if (r.error) {
      erro.textContent = 'Nao entrou: confira email e senha.';
      return;
    }
    mostrarApp(true);
    carregar();
  }

  async function sair() {
    await sb.auth.signOut();
    leads = [];
    mostrarApp(false);
  }

  function init() {
    sb = window.supabase.createClient(CFG.url, CFG.anon);

    doc('btnEntrar').addEventListener('click', entrar);
    doc('senha').addEventListener('keydown', function (e) { if (e.key === 'Enter') entrar(); });
    doc('btnSair').addEventListener('click', sair);
    doc('btnAtualizar').addEventListener('click', carregar);
    doc('abaFila').addEventListener('click', function () { abaAtiva = 'fila'; renderAba(); });
    doc('abaTodos').addEventListener('click', function () { abaAtiva = 'todos'; renderAba(); });
    doc('inputBusca').addEventListener('input', renderAba);

    sb.auth.getSession().then(function (r) {
      var logado = !!(r.data && r.data.session);
      mostrarApp(logado);
      if (logado) carregar();
    });
  }

  return {
    esc: esc, setRotulos: setRotulos, rotulo: rotulo,
    hojeLocalISO: hojeLocalISO, dataLocalDe: dataLocalDe, diasAtraso: diasAtraso,
    entraNaFila: entraNaFila, montarFila: montarFila, filtrarBusca: filtrarBusca,
    waHrefFila: waHrefFila, waHrefLimpo: waHrefLimpo,
    cardHTML: cardHTML, renderLista: renderLista,
    init: init,
    _setLeads: function (ls) { leads = ls; }
  };
})();

if (!window.__PITWALL_SEM_INIT) {
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () { window.PitWall.init(); });
  } else {
    window.PitWall.init();
  }
}
</script>
</body>
</html>
